<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasil — Sekolah Santo Andreas</title>
    <link rel="stylesheet" href="results.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.7.2/css/all.min.css">
</head>

<body>

    <div class="bg-image"></div>
    <div class="bg-overlay" id="bgOverlay"></div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <main class="results-wrapper">

        <!-- Step 1: Check button screen -->
        <div class="card" id="checkCard">
            <div class="brand">
                <img src="https://i.ibb.co.com/V033MvMm/St-Andreas-Logo.png" alt="Logo" class="brand-logo"
                    style="width: 300px;">
            </div>

            <div class="welcome-text">
                <p class="welcome-label">Selamat datang,</p>
                <h1 class="welcome-name" id="userName">—</h1>
                <p class="welcome-level" id="userLevel">—</p>
            </div>

            <div class="divider"></div>

            <p class="check-hint">Klik tombol di bawah untuk melihat hasil ujian Anda.</p>

            <button class="check-btn" id="checkBtn">
                <span>Lihat Hasil Saya</span>
                <i class="fas fa-graduation-cap"></i>
            </button>
            <p style="color: rgba(255, 255, 255, 0.619); padding-top: 5px; padding-bottom: 5px; font-size: 13px;">Atau
            </p>
            <a href="student-hub.html" style="color: white; text-decoration: none;">Ke Hub Siswa <i
                    class="fa-solid fa-arrow-right"></i>
            </a>
        </div>

        <!-- Step 2: Result screen (hidden initially) -->
        <div class="card result-card hidden" id="resultCard">

            <!-- PASS state -->
            <div class="result-state" id="passState">
                <div class="result-icon pass-icon">
                    <i class="fas fa-trophy"></i>
                </div>
                <h1 class="result-title pass-title">You Passed!</h1>
                <p class="result-subtitle">Selamat! Kerja keras Anda membuahkan hasil.</p>
                <p class="result-name" id="passName"></p>

                <div class="result-actions">
                    <!-- shown only for SMP with fileid -->
                    <a class="action-btn primary" id="viewReportBtn" href="#" target="_blank" style="display:none;">
                        <i class="fas fa-file-alt"></i> Lihat Rapor
                    </a>
                    <button class="action-btn secondary" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Keluar
                    </button>
                </div>
            </div>

            <!-- FAIL state -->
            <div class="result-state hidden" id="failState">
                <div class="result-icon fail-icon">
                    <i class="fas fa-heart"></i>
                </div>
                <h1 class="result-title fail-title">Try Again Next Time!</h1>
                <p class="result-subtitle">Jangan menyerah — setiap usaha adalah langkah maju.</p>
                <p class="result-name" id="failName"></p>

                <div class="result-actions">
                    <button class="action-btn secondary" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Keluar
                    </button>
                </div>
            </div>

        </div>

    </main>

    <script src="data.js"></script>
    <script>
        // ── Guard: redirect if not logged in ──────────────
        const user = JSON.parse(localStorage.getItem("loggedUser"));
        if (!user) window.location.href = "login.html";

        // ── Populate welcome screen ───────────────────────
        document.getElementById("userName").textContent = user.name;
        document.getElementById("userLevel").textContent =
            user.level === "smp" ? "SMP Santo Andreas" : "SD Santo Andreas";

        // ── Particles ─────────────────────────────────────
        const container = document.getElementById("particles");
        for (let i = 0; i < 22; i++) {
            const p = document.createElement("span");
            p.className = "particle";
            p.style.cssText = `
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                width: ${4 + Math.random() * 6}px;
                height: ${4 + Math.random() * 6}px;
                animation-delay: ${Math.random() * 6}s;
                animation-duration: ${6 + Math.random() * 8}s;
                opacity: ${0.1 + Math.random() * 0.25};
            `;
            container.appendChild(p);
        }

        // ── Check button logic ────────────────────────────
        document.getElementById("checkBtn").addEventListener("click", () => {
            const checkCard = document.getElementById("checkCard");
            const resultCard = document.getElementById("resultCard");
            const overlay = document.getElementById("bgOverlay");

            // Flip cards
            checkCard.classList.add("card-exit");
            setTimeout(() => {
                checkCard.classList.add("hidden");
                resultCard.classList.remove("hidden");
                resultCard.classList.add("card-enter");

                if (user.status === "pass") {
                    // Show pass state
                    document.getElementById("passState").classList.remove("hidden");
                    document.getElementById("failState").classList.add("hidden");
                    document.getElementById("passName").textContent = user.name;
                    overlay.classList.add("overlay-pass");

                    // Show rapor link for SMP students with a fileid
                    if (user.level === "smp" && user.fileid) {
                        const btn = document.getElementById("viewReportBtn");
                        btn.href = `https://drive.google.com/file/d/${user.fileid}/view`;
                        btn.style.display = "inline-flex";
                    }

                } else {
                    // Show fail state
                    document.getElementById("failState").classList.remove("hidden");
                    document.getElementById("passState").classList.add("hidden");
                    document.getElementById("failName").textContent = user.name;
                    overlay.classList.add("overlay-fail");
                }
            }, 400);
        });

        function logout() {
            localStorage.removeItem("loggedUser");
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
